spring:
  application:
    name: rits
  datasource:
    # SQL Server (Disabled because DB is down)
    # url: jdbc:sqlserver://localhost:1433;databaseName=rits_db;encrypt=true;trustServerCertificate=true
    # username: sa
    # password: 123abcMetnah
    # driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    
    # H2 In-Memory (For Dummy Transactions)
    url: jdbc:h2:mem:ritsdb;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
